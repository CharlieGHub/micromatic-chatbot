<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro Matic Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: #1a1a2e;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #e8c14a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h2 { color: #fff; font-size: 15px; font-weight: 600; }
    .header-info p { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 1px; }

    .header-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }

    .chat-messages {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 400px;
      max-height: 480px;
      background: #f8f8f8;
    }

    .message { display: flex; gap: 8px; align-items: flex-end; }
    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    .bot-av { background: #e8c14a; color: #1a1a2e; }
    .user-av { background: #1a1a2e; color: #e8c14a; }

    .msg-bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      border-radius: 4px 16px 16px 16px;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #e8e8e8;
    }

    .message.user .msg-bubble {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
      border-radius: 16px 4px 16px 16px;
    }

    .msg-bubble a {
      display: inline-block;
      margin-top: 6px;
      margin-right: 4px;
      background: #1a1a2e;
      color: #e8c14a;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 12px;
      text-decoration: none;
    }

    .msg-bubble a:hover { background: #2d2d4e; }

    .typing-bubble {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 4px 16px 16px 16px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .suggestions {
      padding: 10px 14px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sug-label {
      width: 100%;
      font-size: 11px;
      color: #999;
      margin-bottom: 2px;
    }

    .sug-btn {
      font-size: 12px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #f8f8f8;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sug-btn:hover { border-color: #e8c14a; color: #1a1a2e; background: #fff; }

    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      background: #fff;
      border-top: 1px solid #eee;
    }

    .chat-input input {
      flex: 1;
      padding: 9px 14px;
      border-radius: 22px;
      border: 1px solid #ddd;
      font-size: 14px;
      outline: none;
      background: #f8f8f8;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    .chat-input input:focus { border-color: #e8c14a; background: #fff; }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #1a1a2e;
      color: #e8c14a;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #2d2d4e; }
    .send-btn:disabled { background: #ccc; color: #fff; cursor: not-allowed; }

    .chat-footer {
      padding: 8px 14px;
      background: #fff;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-footer span { font-size: 11px; color: #bbb; }
    .chat-footer a { font-size: 11px; color: #999; text-decoration: none; }
    .chat-footer a:hover { color: #1a1a2e; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="header-logo">M</div>
    <div class="header-info">
      <h2>Micro Matic Assistant</h2>
      <p>Beverage dispensing expert</p>
    </div>
    <div class="header-status"></div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <div class="sug-label">Try asking:</div>
    <button class="sug-btn" onclick="suggest(this)">Best home kegerator?</button>
    <button class="sug-btn" onclick="suggest(this)">Which coupler for Bud Light?</button>
    <button class="sug-btn" onclick="suggest(this)">Proper oz per second pour rate?</button>
    <button class="sug-btn" onclick="suggest(this)">How do I fix foamy beer?</button>
    <button class="sug-btn" onclick="suggest(this)">What CO2 pressure should I use?</button>
    <button class="sug-btn" onclick="suggest(this)">Set up a wine on tap system?</button>
    <button class="sug-btn" onclick="suggest(this)">Nitro cold brew coffee setup?</button>
    <button class="sug-btn" onclick="suggest(this)">How often clean beer lines?</button>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask about draft beer, kegerators, couplers..." onkeydown="if(event.key==='Enter' && !event.shiftKey) sendMessage()" />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
  </div>

  <div class="chat-footer">
    <span>Powered by Micro Matic + Claude AI</span>
    <a href="https://www.micromatic.com" target="_blank">micromatic.com &nearr;</a>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById("messages");
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const conversationHistory = [];

  function addMessage(role, html) {
    const wrap = document.createElement("div");
    wrap.className = "message " + role;
    const av = document.createElement("div");
    av.className = "msg-avatar " + (role === "bot" ? "bot-av" : "user-av");
    av.textContent = role === "bot" ? "M" : "You";
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = html;
    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesDiv.appendChild(wrap);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message bot";
    wrap.id = "typing";
    wrap.innerHTML = '<div class="msg-avatar bot-av">M</div><div class="typing-bubble"><span></span><span></span><span></span></div>';
    messagesDiv.appendChild(wrap);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function formatResponse(text) {
    // Convert **bold** to <strong>
    text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    // Convert newlines to <br>
    text = text.replace(/\n/g, "<br>");
    // Convert markdown links [text](url) to anchor tags
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank">$1 &nearr;</a>');
    return text;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    sendBtn.disabled = true;
    document.getElementById("suggestions").style.display = "none";

    addMessage("user", text);
    conversationHistory.push({ role: "user", content: text });
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        conversationHistory.push({ role: "assistant", content: data.reply });
        addMessage("bot", formatResponse(data.reply));
      } else {
        addMessage("bot", "Sorry, something went wrong. Please try again!");
      }
    } catch (err) {
      removeTyping();
      addMessage("bot", "Connection error. Please check the server is running.");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function suggest(btn) {
    input.value = btn.textContent;
    input.focus();
    sendMessage();
  }

  // Welcome message on load
  addMessage("bot", "Hi! I'm the Micro Matic assistant — your expert on draft beer systems, kegerators, couplers, line cleaning, pour rates, and everything beverage dispensing. What can I help you with today?");
</script>

</body>
</html>
